services:
  postgres:
    image: postgres:17
    container_name: contract-scanner-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: contract_scanner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d contract_scanner"]
      interval: 5s
      timeout: 5s
      retries: 5

